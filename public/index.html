<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Siggy Ritual AI</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

</head>

<body>

<div class="background"></div>
<div class="background-glow"></div>

<div id="tsparticles"></div>

<header class="header">

<div class="logo">

<div class="siggy-icon">🧙‍♀️</div>

<div>
<h2>Siggy</h2>
<span>Arcane Guardian of Ritual</span>
</div>

</div>

<div class="status">
● Channeling the Grid
</div>

</header>


<main class="center">

<div class="title-zone">

<div class="star">🧙‍♀️</div>

<h1>🫧🅳🅴🅼🅾 🅽🅸🅶🅷🆃🫧</h1>

<p>
Siggy loves everyone, so ask and Siggy will answer.
</p>

</div>

<div id="chat"></div>

</main>


<!-- INPUT BAR -->

<div class="input-bar">

<button id="attach" class="tool-btn">📎</button> 
  
<input id="input" placeholder="Ask anything"/>

<select id="mode">
<option value="auto">Auto</option>
<option value="fast">Fast</option>
<option value="smart">Smart</option>
</select>

<!-- VOICE INPUT (MIC) -->

<button id="voice" class="voice-btn">

<svg viewBox="0 0 24 24" width="18" height="18" fill="white">
<path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3zm5-3a1 1 0 1 0-2 0 3 3 0 0 1-6 0 1 1 0 1 0-2 0 5 5 0 0 0 4 4.9V19H9a1 1 0 0 0 0 2h6a1 1 0 0 0 0-2h-2v-3.1A5 5 0 0 0 17 11z"/>
</svg>

</button>

<!-- VOICE REPLY TOGGLE -->

<button id="voiceToggle" class="tool-btn">
🔊
</button>

<button id="send">➤</button>

</div>


<input type="file" id="fileInput" style="display:none">

<script src="script.js"></script>

</body>
</html>
