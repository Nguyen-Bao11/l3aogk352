<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Siggy Ritual AI</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

</head>

<body>

<div id="tsparticles"></div>

<header class="header">

<div class="logo">

<div class="siggy-icon">🧙‍♀️</div>

<div>
<h2>Siggy</h2>
<span>Arcane Guardian of Ritual</span>
</div>

</div>

<div class="status">
Channeling the Grid
</div>

</header>

<main class="center">

<div class="title-zone">

<div class="star">🧙‍♀️</div>

<h1>🫧 DEMO NIGHT 🫧</h1>

<p>Siggy loves everyone, ask anything.</p>

</div>

<div id="chat"></div>

</main>

<div class="input-bar">

<button id="attach" class="tool-btn">📎</button>

<input id="input" placeholder="Ask anything"/>

<select id="mode">
<option>Auto</option>
<option>Fast</option>
<option>Smart</option>
</select>

<button id="voice" class="voice-btn">

<svg viewBox="0 0 24 24" width="18" height="18">
<path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3z"/>
</svg>

</button>

<button id="send">➤</button>

</div>

<input type="file" id="fileInput" hidden>

<script src="script.js"></script>

</body>
</html>
